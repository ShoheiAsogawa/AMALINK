name: Deploy to GitHub Pages

on:
  push:
    branches: [main, feature/cms-news-home-updates]
  schedule:
    # microCMS 更新を定期取り込み（JSTで概ね毎時15分）
    - cron: '15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-feature-to-main:
    if: github.event_name == 'push' && github.ref == 'refs/heads/feature/cms-news-home-updates'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fast-forward main from feature
        run: |
          git fetch origin main feature/cms-news-home-updates
          git checkout main
          git merge --ff-only origin/feature/cms-news-home-updates
          git push origin main

  build-and-deploy:
    if: github.event_name != 'push' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        run: npm run build:gh-pages
        env:
          MICROCMS_SERVICE_DOMAIN: ${{ secrets.MICROCMS_SERVICE_DOMAIN }}
          MICROCMS_API_KEY: ${{ secrets.MICROCMS_API_KEY }}
          NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY: ${{ secrets.NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY }}
          GITHUB_PAGES: 'true'

      - name: Commit and push docs/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "chore: rebuild docs [skip ci]"
          git push
